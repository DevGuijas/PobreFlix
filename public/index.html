<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - PobreFlix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
</head>
<body>
    <header id="mainHeader">
        <a href="/" class="logo">PobreFlix</a>
        <div class="nav-actions">
            <div class="search-bar">
                <span class="material-symbols-outlined">search</span>
                <input type="text" id="searchInput" placeholder="Títulos, gente e gêneros" onkeyup="searchMovies()">
            </div>
            <a href="admin.html" class="btn" style="background: rgba(109, 109, 110, 0.7); color: white;">+ Adicionar</a>
            
            <div class="profile-container" onclick="toggleDropdown(event)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Perfil" class="profile-avatar">
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="#">Editar Perfil</a>
                    <a href="#">Configurações</a>
                    <hr style="border-color: #333; margin: 5px 0;">
                    <a href="manage.html">Gerenciar Filmes</a>
                </div>
            </div>
        </div>
    </header>

    <div class="hero-banner" id="heroBanner">
        <div class="hero-contents">
            <h1 id="heroTitle">Bem-vindo ao PobreFlix</h1>
            <p id="heroSynopsis">Seu catálogo pessoal de filmes. Adicione seus títulos favoritos e assista de qualquer lugar da sua casa, sem depender de internet externa.</p>
            <div class="hero-buttons">
                <button class="hero-btn play-btn" onclick="playHeroMovie()">
                    <span class="material-symbols-outlined">play_arrow</span> Assistir
                </button>
            </div>
        </div>
        <div class="hero-fade-bottom"></div>
    </div>

    <div class="movie-row">
        <h2>Adicionados Recentemente</h2>
        <div class="row-posters" id="movieGrid">
            </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Efeito do Header ao rolar a página
        window.addEventListener('scroll', () => {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });
        loadMovies();
    </script>
</body>
</html>
