<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistindo - PobreFlix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
</head>
<body>
    <div class="player-container" id="playerContainer">
        
        <div class="loading-spinner" id="loadingSpinner"></div>
        
        <video id="pobrePlayer"></video>
        
        <div class="top-controls">
            <button class="control-btn" onclick="window.history.back()">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h2 id="topMovieTitle">Carregando...</h2>
        </div>

        <div class="player-controls">
            <div class="progress-wrapper" id="progressBar">
                <div class="progress-background">
                    <div class="progress-filled" id="progressFilled">
                        <div class="progress-knob"></div>
                    </div>
                </div>
            </div>
            
            <div class="controls-main">
                <div class="controls-left">
                    <button class="control-btn" id="playPauseBtn">
                        <span class="material-symbols-outlined" id="playIcon">play_arrow</span>
                    </button>
                    <button class="control-btn" id="rewindBtn">
                        <span class="material-symbols-outlined">replay_10</span>
                    </button>
                    <button class="control-btn" id="forwardBtn">
                        <span class="material-symbols-outlined">forward_10</span>
                    </button>
                    
                    <div class="volume-container">
                        <button class="control-btn" id="muteBtn">
                            <span class="material-symbols-outlined" id="volumeIcon">volume_up</span>
                        </button>
                        <input type="range" id="volumeBar" min="0" max="1" step="0.05" value="1">
                    </div>
                    
                    <span id="timeDisplay" class="time-display">00:00 / 00:00</span>
                </div>

                <div class="controls-right">
                    <button class="control-btn" id="fullscreenBtn">
                        <span class="material-symbols-outlined" id="fsIcon">fullscreen</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>initPlayer();</script>
</body>
</html>
